; =========================================================
; 01. Fzlwhyc OpenClash 自定义模板 v1
; 作用：
; - 固定功能组名称，兼容你现有复写规则
; - 自动按地区归类节点
; - 增加“国外总模式”总开关
; - 让机场只负责提供节点，模板负责构建结构
; =========================================================

[custom]

; =========================================================
; 02. 基础行为设置
; 说明：
; - 这里先不强行覆盖机场原始规则，避免第一次就改太猛
; - 你自己的 OpenClash「自定义规则」继续生效
; =========================================================
enable_rule_generator=false
overwrite_original_rules=false

; =========================================================
; 03. 核心总开关组
; 说明：
; - 🚀 节点选择：总入口
; - 🌐 国外总模式：你以后“一键全国外改走美国/日本”的关键
; =========================================================
custom_proxy_group=🚀 节点选择`select`[]🌐 国外总模式[]DIRECT[]♻️ 全部-自动[]🇭🇰 香港-自动[]🇹🇼 台湾-自动[]🇯🇵 日本-自动[]🇺🇸 美国-自动[]🇸🇬 新加坡-自动[]🇰🇷 韩国-自动[]🌍 国外
custom_proxy_group=🌐 国外总模式`select`[]🎯 功能分流[]🇺🇸 美国-自动[]🇯🇵 日本-自动[]🇹🇼 台湾-自动[]🇭🇰 香港-自动[]🇸🇬 新加坡-自动[]🇰🇷 韩国-自动[]♻️ 全部-自动[]🌍 国外[]DIRECT

; =========================================================
; 04. 功能组
; 说明：
; - 第一项统一放“🌐 国外总模式”
; - 这样你想临时全站改走美国时，只改一个地方
; - 平时则可以回到功能分流
; =========================================================
custom_proxy_group=🎯 功能分流`select`[]🌍 国外[]📘 GitHub[]👽 AI1[]👽 AI2[]📡 Telegram[]🎬 流媒体
custom_proxy_group=🌍 国外`select`[]🌐 国外总模式[]🇭🇰 香港-自动[]🇹🇼 台湾-自动[]🇯🇵 日本-自动[]🇺🇸 美国-自动[]🇸🇬 新加坡-自动[]🇰🇷 韩国-自动[]♻️ 全部-自动[]DIRECT
custom_proxy_group=📘 GitHub`select`[]🌐 国外总模式[]🇭🇰 香港-自动[]🇹🇼 台湾-自动[]🇯🇵 日本-自动[]🇺🇸 美国-自动[]🇸🇬 新加坡-自动[]♻️ 全部-自动[]DIRECT
custom_proxy_group=👽 AI1`select`[]🌐 国外总模式[]🇺🇸 美国-自动[]🇹🇼 台湾-自动[]🇯🇵 日本-自动[]🇸🇬 新加坡-自动[]🇭🇰 香港-自动[]REJECT
custom_proxy_group=👽 AI2`select`[]🌐 国外总模式[]🇺🇸 美国-自动[]🇹🇼 台湾-自动[]🇯🇵 日本-自动[]🇸🇬 新加坡-自动[]REJECT
custom_proxy_group=📡 Telegram`select`[]🌐 国外总模式[]🇸🇬 新加坡-自动[]🇭🇰 香港-自动[]🇯🇵 日本-自动[]🇺🇸 美国-自动[]🇹🇼 台湾-自动[]♻️ 全部-自动
custom_proxy_group=🎬 流媒体`select`[]🌐 国外总模式[]🇸🇬 新加坡-自动[]🇭🇰 香港-自动[]🇹🇼 台湾-自动[]🇯🇵 日本-自动[]🇺🇸 美国-自动[]♻️ 全部-自动[]DIRECT
custom_proxy_group=🏠 国内`select`[]DIRECT[]🌐 国外总模式

; =========================================================
; 05. 地区测速组
; 说明：
; - 使用 url-test 自动选最快节点
; - 正则尽量放宽，适配不同机场命名
; - interval=300 秒，可按需改
; =========================================================
custom_proxy_group=♻️ 全部-自动`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇭🇰 香港-自动`url-test`(港|HK|Hong Kong|HongKong|香港)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 台湾-自动`url-test`(台|TW|Taiwan|台湾|Taipei|台北|新北|桃園|高雄)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本-自动`url-test`(日|JP|Japan|日本|Tokyo|东京|大阪|Osaka)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国-自动`url-test`(美|US|USA|United States|America|美国|洛杉矶|硅谷|圣何塞|西雅图|纽约|Chicago|Chicago|San Jose|Los Angeles|Seattle|New York)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡-自动`url-test`(新加坡|狮城|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇰🇷 韩国-自动`url-test`(韩|KR|Korea|韩国|首尔|Seoul)`http://www.gstatic.com/generate_204`300,,50

; =========================================================
; 06. 手动地区组（可选）
; 说明：
; - 这些是手动选择组，不测速
; - 适合你有时想明确钉死某地区某节点
; =========================================================
custom_proxy_group=🇭🇰 香港-手动`select`(港|HK|Hong Kong|HongKong|香港)
custom_proxy_group=🇹🇼 台湾-手动`select`(台|TW|Taiwan|台湾|Taipei|台北|新北|桃園|高雄)
custom_proxy_group=🇯🇵 日本-手动`select`(日|JP|Japan|日本|Tokyo|东京|大阪|Osaka)
custom_proxy_group=🇺🇸 美国-手动`select`(美|US|USA|United States|America|美国|洛杉矶|硅谷|圣何塞|西雅图|纽约|San Jose|Los Angeles|Seattle|New York)
custom_proxy_group=🇸🇬 新加坡-手动`select`(新加坡|狮城|SG|Singapore)
custom_proxy_group=🇰🇷 韩国-手动`select`(韩|KR|Korea|韩国|首尔|Seoul)

; =========================================================
; 07. 兜底组（可选）
; 说明：
; - 以后若你要加漏网规则，可以直接指向这个组
; =========================================================
custom_proxy_group=🐟 漏网之鱼`select`[]🌐 国外总模式[]🌍 国外[]DIRECT[]♻️ 全部-自动

; =========================================================
; 08. 预留说明
; 说明：
; - 这里暂不写 ruleset，避免第一次部署过复杂
; - 你的 OpenClash「自定义规则」继续使用即可
; =========================================================