; =========================================================
; Fzlwhyc OpenClash 自定义模板 v4 (混合架构版)
; 作用：
; - 仅包含策略组结构与开源 Ruleset 挂载
; - 私有规则（PT、局域网等）交由本地 OpenClash 覆写处理
; =========================================================

[custom]

enable_rule_generator=true
overwrite_original_rules=true

; 01. 核心总开关组
custom_proxy_group=🌐 国外总模式`select`[]♻️ 全部-自动[]🇭🇰 香港-自动[]🇹🇼 台湾-自动[]🇯🇵 日本-自动[]🇺🇸 美国-自动[]🇸🇬 新加坡-自动[]🇰🇷 韩国-自动[]DIRECT

; 02. 功能组
custom_proxy_group=👽 AI`select`[]🌐 国外总模式[]🇺🇸 美国-自动[]🇹🇼 台湾-自动[]🇯🇵 日本-自动[]🇸🇬 新加坡-自动[]🇭🇰 香港-自动
custom_proxy_group=📘 GitHub`select`[]🌐 国外总模式[]🇭🇰 香港-自动[]🇹🇼 台湾-自动[]🇯🇵 日本-自动[]🇺🇸 美国-自动[]🇸🇬 新加坡-自动
custom_proxy_group=📡 Telegram`select`[]🌐 国外总模式[]🇸🇬 新加坡-自动[]🇭🇰 香港-自动[]🇯🇵 日本-自动[]🇺🇸 美国-自动[]🇹🇼 台湾-自动
custom_proxy_group=🎬 流媒体`select`[]🌐 国外总模式[]🇸🇬 新加坡-自动[]🇭🇰 香港-自动[]🇹🇼 台湾-自动[]🇯🇵 日本-自动[]🇺🇸 美国-自动
custom_proxy_group=🌍 国外`select`[]🌐 国外总模式[]🇭🇰 香港-自动[]🇹🇼 台湾-自动[]🇯🇵 日本-自动[]🇺🇸 美国-自动[]🇸🇬 新加坡-自动[]🇰🇷 韩国-自动
custom_proxy_group=🏠 国内`select`[]DIRECT[]🌐 国外总模式

; 03. 地区测速组
custom_proxy_group=♻️ 全部-自动`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇭🇰 香港-自动`url-test`(港|HK|Hong Kong|HongKong|香港)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 台湾-自动`url-test`(台|TW|Taiwan|台湾|Taipei|台北|新北|桃園|高雄)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本-自动`url-test`(日|JP|Japan|日本|Tokyo|东京|大阪|Osaka)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国-自动`url-test`(美|US|USA|United States|America|美国|洛杉矶|硅谷|圣何塞|西雅图|纽约|Chicago|San Jose|Los Angeles|Seattle|New York)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡-自动`url-test`(新加坡|狮城|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇰🇷 韩国-自动`url-test`(韩|KR|Korea|韩国|首尔|Seoul)`http://www.gstatic.com/generate_204`300,,50

; 04. 手动地区组
custom_proxy_group=🇭🇰 香港-手动`select`(港|HK|Hong Kong|HongKong|香港)
custom_proxy_group=🇹🇼 台湾-手动`select`(台|TW|Taiwan|台湾|Taipei|台北|新北|桃園|高雄)
custom_proxy_group=🇯🇵 日本-手动`select`(日|JP|Japan|日本|Tokyo|东京|大阪|Osaka)
custom_proxy_group=🇺🇸 美国-手动`select`(美|US|USA|United States|America|美国|洛杉矶|硅谷|圣何塞|西雅图|纽约|San Jose|Los Angeles|Seattle|New York)
custom_proxy_group=🇸🇬 新加坡-手动`select`(新加坡|狮城|SG|Singapore)
custom_proxy_group=🇰🇷 韩国-手动`select`(韩|KR|Korea|韩国|首尔|Seoul)

; 05. 兜底组
custom_proxy_group=🐟 漏网之鱼`select`[]🌐 国外总模式[]🌍 国外[]DIRECT[]♻️ 全部-自动

; 06. 核心路由规则集 (Rulesets)
ruleset=👽 AI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=📘 GitHub,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GitHub.list
ruleset=📡 Telegram,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🎬 流媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=🌍 国外,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list
ruleset=🏠 国内,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]MATCH
